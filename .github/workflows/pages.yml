name: Deploy wiki to GitHub Pages

on:
  push:
    branches: [main]
    # Content edits are read by the site at runtime straight from the repo,
    # so they don't need a rebuild — only app changes do.
    paths-ignore:
      - "content/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build:pages
        env:
          # Site served at https://<user>.github.io/<repo>/ (or your domain's /<repo>/ path).
          # If the site lives at the domain root instead, change this to "/".
          WIKI_BASE: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
